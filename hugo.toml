baseURL = "https://eyetheekh.pages.dev/"
title = "Eyetheekh S P"
theme = "hugo-trainsh"

# --- language ---
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 1
    title = "Eyetheekh S P"
    contentDir = "content/en"

    [[languages.en.menu.main]]
      name = "Home"
      pageRef = "/"
      weight = 10

    [[languages.en.menu.main]]
      name = "Blog"
      pageRef = "/blog"
      weight = 20

    [[languages.en.menu.main]]
      name = "Projects"
      pageRef = "/projects"
      weight = 30

    [[languages.en.menu.main]]
      name = "OSS"
      pageRef = "/oss"
      weight = 40

    [[languages.en.menu.main]]
      name = "About"
      pageRef = "/about"
      weight = 50


# --- theme params ---
[params]
  mainSections = ["posts", "oss"]
  description = "Backend Engineer | Python"
  author = "EYETHEEKH S P"

  defaultColorScheme = "retro"

  # Footer social links
  [params.social]
    github = "https://github.com/eyetheekh"
    linkedin = "https://linkedin.com/in/eyetheekh"
    email = "eyetheekhsp@gmail.com"

# --- outputs (required for search index) ---
[outputs]
  home = ["HTML", "RSS", "JSON"]


# --- URL normalization ---
disablePathToLower = false
removePathAccents = true
preserveTaxonomyNames = false


# --- markup ---
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\\[', '\\]']]
          inline = [['$', '$'], ['\\(', '\\)']]